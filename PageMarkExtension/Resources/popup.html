<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>PageMark</title>
</head>

<body>
    <div class="viewport">
        <!-- Main View -->
        <div class="view main-view" id="mainView" role="main" aria-label="Pinned messages">
            <div class="header">
                <div class="icon-row">
                    <svg class="logo" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M5 4C5 2.89543 5.89543 2 7 2H17C18.1046 2 19 2.89543 19 4V21L12 17L5 21V4Z"
                            fill="url(#grad)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="grad" x1="5" y1="2" x2="19" y2="21" gradientUnits="userSpaceOnUse">
                                <stop stop-color="var(--accent)" />
                                <stop offset="1" stop-color="var(--accent-hover)" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1>PageMark</h1>
                    <button class="gear-btn" id="openSettings" aria-label="Open settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                </div>
                <p class="subtitle">Pinned AI chat messages</p>
            </div>

            <div id="pinList" class="pin-list" role="list" aria-label="Pinned messages list">
                <div class="loading" role="status">Loading pins…</div>
            </div>

            <div id="emptyState" class="empty-state hidden" role="status">
                <span class="empty-icon" aria-hidden="true">📌</span>
                <p class="empty-title">No pinned messages</p>
                <p class="empty-hint">Hover over a query in any AI chat and click the 📌 button to pin it.</p>
            </div>
        </div>

        <!-- Settings View (overlay) -->
        <div class="view settings-view" id="settingsView" role="dialog" aria-label="Settings" aria-hidden="true">
            <div class="settings-header">
                <button class="back-btn" id="closeSettings" aria-label="Back to main view">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Back
                </button>
                <h2>Settings</h2>
            </div>

            <!-- Theme -->
            <div class="settings-section">
                <label class="section-label" id="themeLabel">Appearance</label>
                <div class="segmented-control" id="themeControl" role="radiogroup" aria-labelledby="themeLabel">
                    <button data-value="system" class="seg-btn active" role="radio" aria-checked="true"
                        aria-label="System theme">System</button>
                    <button data-value="light" class="seg-btn" role="radio" aria-checked="false"
                        aria-label="Light theme">Light</button>
                    <button data-value="dark" class="seg-btn" role="radio" aria-checked="false"
                        aria-label="Dark theme">Dark</button>
                </div>
            </div>

            <!-- Privacy & Focus -->
            <div class="settings-section">
                <label class="section-label">Privacy &amp; Focus</label>
                <button class="action-btn" id="ignoreCurrentBtn" aria-label="Disable PageMark on the current website">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
                    </svg>
                    Disable on this site
                </button>
                <div class="domain-list" id="domainList" role="list" aria-label="Ignored domains">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="settings-section danger-section">
                <label class="section-label">Data</label>
                <button class="destructive-btn" id="clearAllBtn" aria-label="Clear all pinned data and settings">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6l-2 14H7L5 6"></path>
                        <path d="M10 11v6"></path>
                        <path d="M14 11v6"></path>
                    </svg>
                    Clear All Data
                </button>
                <p class="danger-hint">Removes all pins and extension settings.</p>
            </div>

            <div class="settings-footer">
                <p>PageMark v1.0</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>
    <script src="popup.js"></script>
</body>

</html>
